<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Список дел</title>
    <link rel="stylesheet" href="DZ1.CSS"/>
</head>
<body>

    <h1>Список дел</h1>

    <div class="form-row">
        <input type="text" id="newItem" placeholder="Новый элемент списка"/>
        <button class="btn-create">Создать</button>
        <button class="btn-clear">Очистить всё</button>
    </div>

    <ol class="todo-list">
        <li class="todo-item">
            <input type="checkbox" id="item1"/>
            <label for="item1">Почесать кошку</label>
        </li>
        <li class="todo-item">
            <input type="checkbox" id="item2"/>
            <label for="item2">Полить картошку</label>
        </li>
        <li class="todo-item">
            <input type="checkbox" id="item3"/>
            <label for="item3">Сложить в лукошко</label>
        </li>
    </ol>

    <footer>Copyright ©</footer>

</body>
</html>
